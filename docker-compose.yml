services:
  mysql:
    image: mysql:8.0
    container_name: jamping-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jamping
      MYSQL_USER: jamping
      MYSQL_PASSWORD: jamping1234
      MYSQL_ROOT_PASSWORD: root1234
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
